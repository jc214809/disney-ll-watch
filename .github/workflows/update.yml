name: Update Lightning Lane Data

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lightning-lane-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Updater
        env:
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        run: |
          python scripts/update.py

      - name: Push Data to Orphan Branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git checkout --orphan data-tmp
          git reset
          git add data.json state.json
          git commit -m "Update Lightning Lane data"
          git push origin data-tmp:data --force
          git checkout -f main
          git branch -D data-tmp
