<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disney Lightning Lane Watch</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*, *::before, *::after {
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #060c1a;
    background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(29, 78, 216, 0.25), transparent),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124, 58, 237, 0.12), transparent);
    color: #e2e8f0;
    margin: 0;
    min-height: 100vh;
    padding: 0 0 60px;
}

header {
    text-align: center;
    padding: 48px 20px 24px;
    background: linear-gradient(180deg, rgba(29,78,216,0.12) 0%, transparent 100%);
    border-bottom: 1px solid rgba(99, 155, 255, 0.1);
}

h1 {
    margin: 0 0 10px;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #93c5fd 0%, #c4b5fd 50%, #f9a8d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

#updated {
    font-size: 0.8rem;
    color: #64748b;
    letter-spacing: 0.04em;
    text-transform: uppercase;
}

/* Date tab bar */
#date-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 20px 20px 0;
    max-width: 900px;
    margin: 0 auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

#date-tabs::-webkit-scrollbar {
    display: none;
}

.date-tab {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 999px;
    border: 1px solid rgba(51, 65, 85, 0.8);
    background: rgba(15, 23, 42, 0.6);
    color: #94a3b8;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
}

.date-tab:hover {
    border-color: rgba(99, 155, 255, 0.4);
    color: #cbd5e1;
}

.date-tab.active {
    background: rgba(29, 78, 216, 0.3);
    border-color: rgba(99, 155, 255, 0.6);
    color: #93c5fd;
    box-shadow: 0 0 12px rgba(29, 78, 216, 0.2);
}

#errors {
    max-width: 900px;
    margin: 16px auto 0;
    padding: 0 20px;
}

#content {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 20px;
}

.cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.park-card {
    background: rgba(15, 23, 42, 0.7);
    border: 1px solid rgba(51, 65, 85, 0.6);
    border-radius: 12px;
    overflow: hidden;
    backdrop-filter: blur(8px);
    transition: border-color 0.2s;
}

.park-card:hover {
    border-color: rgba(99, 155, 255, 0.3);
}

.park-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: rgba(30, 41, 59, 0.8);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: #cbd5e1;
    border-bottom: 1px solid rgba(51, 65, 85, 0.6);
}

.park-header img {
    width: 28px;
    height: 28px;
    opacity: 0.85;
    filter: invert(1);
    flex-shrink: 0;
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

table th:nth-child(1), table td:nth-child(1) { width: auto; }
table th:nth-child(2), table td:nth-child(2) { width: 120px; }
table th:nth-child(3), table td:nth-child(3) { width: 120px; }

th {
    padding: 10px 18px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #475569;
    text-align: left;
    background: transparent;
}

th:last-child {
    text-align: center;
}

td {
    padding: 12px 18px;
    font-size: 0.88rem;
    border-bottom: 1px solid rgba(30, 41, 59, 0.8);
    color: #cbd5e1;
    transition: background 0.15s;
}

tr:last-child td {
    border-bottom: none;
}

tr:hover td {
    background: rgba(255, 255, 255, 0.03);
}

.available td {
    background: rgba(34, 197, 94, 0.05);
}

.available:hover td {
    background: rgba(34, 197, 94, 0.09);
}

.unavailable td {
    background: rgba(239, 68, 68, 0.04);
}

.unavailable:hover td {
    background: rgba(239, 68, 68, 0.08);
}

td:last-child {
    text-align: center;
}

.status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 999px;
}

.yes {
    color: #4ade80;
    background: rgba(74, 222, 128, 0.12);
    border: 1px solid rgba(74, 222, 128, 0.25);
}

.yes::before {
    content: '●';
    font-size: 0.5rem;
    color: #4ade80;
    text-shadow: 0 0 6px #4ade80;
}

.no {
    color: #f87171;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.2);
}

.no::before {
    content: '●';
    font-size: 0.5rem;
    color: #f87171;
}

.price {
    font-variant-numeric: tabular-nums;
    color: #94a3b8;
    font-size: 0.85rem;
}

.error {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fca5a5;
    padding: 12px 16px;
    margin: 8px 0;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: 8px;
    font-size: 0.85rem;
}

.error::before {
    content: '⚠';
    flex-shrink: 0;
}

@media (max-width: 640px) {
    header {
        padding: 28px 16px 16px;
    }

    #date-tabs {
        padding: 16px 12px 0;
        gap: 6px;
    }

    .date-tab {
        padding: 7px 14px;
        font-size: 0.72rem;
    }

    #content, #errors {
        padding: 0 12px;
    }

    .cards-grid {
        grid-template-columns: 1fr;
    }

    .park-header {
        font-size: 0.8rem;
        padding: 12px 14px;
    }

    .park-header img {
        width: 22px;
        height: 22px;
    }

    table th:nth-child(2), table td:nth-child(2) { width: 80px; }
    table th:nth-child(3), table td:nth-child(3) { width: 90px; }

    th {
        padding: 8px 14px;
        font-size: 0.65rem;
    }

    td {
        padding: 10px 14px;
        font-size: 0.82rem;
    }

    .status {
        font-size: 0.65rem;
        padding: 3px 8px;
    }
}
</style>
</head>

<body>

<header>
    <h1>Disney Lightning Lane Watch</h1>
    <div id="updated">Loading...</div>
</header>

<div id="date-tabs"></div>
<div id="errors"></div>
<div id="content"></div>

<script>
async function loadData() {
    try {
        const response = await fetch(
            `https://raw.githubusercontent.com/jc214809/disney-ll-watch/data/data.json?v=${Date.now()}`
        );

        const data = await response.json();

        const updatedDate = new Date(data.updated_at);
        document.getElementById("updated").innerText =
            `Last Updated: ${updatedDate.toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })}`;

        if (data.errors && data.errors.length > 0) {
            document.getElementById("errors").innerHTML =
                data.errors.map(error => `
                    <div class="error">
                        ${error.park}: ${error.error}
                    </div>
                `).join('');
        }

        const grouped = {};
        const today = new Date().toISOString().slice(0, 10);
        const tomorrowStr = new Date(new Date().getTime() + 86400000).toISOString().slice(0, 10);

        data.items.forEach(item => {
            if (item.date < today) return;
            if (!grouped[item.date]) grouped[item.date] = {};
            if (!grouped[item.date][item.park]) grouped[item.date][item.park] = [];
            grouped[item.date][item.park].push(item);
        });

        const parkIcons = {
            'Magic Kingdom': 'icons/magic-kingdom.svg',
            'EPCOT': 'icons/epcot.svg',
            'Hollywood Studios': 'icons/hollywood-studios.svg',
            'Animal Kingdom': 'icons/animal-kingdom.svg',
        };

        const dates = Object.keys(grouped).sort();

        function dateLabel(date) {
            if (date === today) return 'Today';
            if (date === tomorrowStr) return 'Tomorrow';
            const d = new Date(date + 'T12:00:00');
            return d.toLocaleDateString(undefined, { month: 'numeric', day: 'numeric' })
                + ' · ' + d.toLocaleDateString(undefined, { weekday: 'short' });
        }

        function renderDate(date) {
            const parks = grouped[date];
            let html = '<div class="cards-grid">';
            Object.keys(parks).sort().forEach(park => {
                const iconSrc = parkIcons[park] || '';
                const iconHtml = iconSrc ? `<img src="${iconSrc}" alt="">` : '';
                html += `
                    <div class="park-card">
                        <div class="park-header">${iconHtml}${park}</div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Ride</th>
                                    <th>Price</th>
                                    <th>Available</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                parks[park].forEach(item => {
                    html += `
                        <tr class="${item.available ? 'available' : 'unavailable'}">
                            <td>${item.ride}</td>
                            <td class="price">${item.price_formatted}</td>
                            <td><span class="status ${item.available ? 'yes' : 'no'}">${item.available ? 'YES' : 'NO'}</span></td>
                        </tr>
                    `;
                });
                html += `</tbody></table></div>`;
            });
            html += '</div>';
            document.getElementById("content").innerHTML = html;
        }

        let activeDate = dates[0];

        const tabsEl = document.getElementById("date-tabs");
        tabsEl.innerHTML = dates.map(date => `
            <button class="date-tab${date === activeDate ? ' active' : ''}" data-date="${date}">
                ${dateLabel(date)}
            </button>
        `).join('');

        tabsEl.addEventListener('click', e => {
            const tab = e.target.closest('.date-tab');
            if (!tab) return;
            activeDate = tab.dataset.date;
            tabsEl.querySelectorAll('.date-tab').forEach(t => t.classList.toggle('active', t === tab));
            renderDate(activeDate);
        });

        renderDate(activeDate);

    } catch (err) {
        document.getElementById("content").innerHTML =
            `<div class="error">${err}</div>`;
    }
}

loadData();
</script>

</body>
</html>
