<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disney Lightning Lane Watch</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

#updated {
    text-align: center;
    margin-bottom: 20px;
    color: #cbd5e1;
}

.date-header {
    background: #173761;
    padding: 12px;
    margin-top: 20px;
    font-size: 1.2rem;
    font-weight: bold;
    border-radius: 6px;
}

.park-header {
    background: #102544;
    padding: 10px;
    margin-top: 10px;
    font-size: 1rem;
    border-radius: 6px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 5px;
}

th {
    background: #1e293b;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #334155;
}

.available {
    background: rgba(34,197,94,.15);
}

.unavailable {
    background: rgba(239,68,68,.15);
}

.status {
    font-weight: bold;
}

.yes {
    color: #22c55e;
}

.no {
    color: #ef4444;
}

.error {
    color: #f87171;
    padding: 10px;
    margin: 10px 0;
    background: rgba(239,68,68,.15);
    border-radius: 6px;
}
</style>
</head>

<body>

<h1>Disney Lightning Lane Watch</h1>

<div id="updated">Loading...</div>

<div id="errors"></div>

<div id="content"></div>

<script>
async function loadData() {
    try {
        const response = await fetch(
            `data.json?v=${Date.now()}`
        );

        const data = await response.json();

        document.getElementById("updated").innerText =
            `Last Updated: ${data.updated_at}`;

        if (data.errors && data.errors.length > 0) {
            document.getElementById("errors").innerHTML =
                data.errors.map(error => `
                    <div class="error">
                        ${error.park}: ${error.error}
                    </div>
                `).join('');
        }

        const grouped = {};

        data.items.forEach(item => {
            if (!grouped[item.date]) {
                grouped[item.date] = {};
            }

            if (!grouped[item.date][item.park]) {
                grouped[item.date][item.park] = [];
            }

            grouped[item.date][item.park].push(item);
        });

        let html = '';

        Object.keys(grouped)
            .sort()
            .forEach(date => {

                html += `
                    <div class="date-header">
                        ${date}
                    </div>
                `;

                Object.keys(grouped[date])
                    .sort()
                    .forEach(park => {

                        html += `
                            <div class="park-header">
                                ${park}
                            </div>

                            <table>
                                <thead>
                                    <tr>
                                        <th>Ride</th>
                                        <th>Price</th>
                                        <th>Available</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;

                        grouped[date][park].forEach(item => {

                            html += `
                                <tr class="${item.available ? 'available' : 'unavailable'}">
                                    <td>${item.ride}</td>
                                    <td>${item.price_formatted}</td>
                                    <td class="status ${item.available ? 'yes' : 'no'}">
                                        ${item.available ? 'YES' : 'NO'}
                                    </td>
                                </tr>
                            `;
                        });

                        html += `
                                </tbody>
                            </table>
                        `;
                    });
            });

        document.getElementById("content").innerHTML = html;

    } catch (err) {
        document.getElementById("content").innerHTML =
            `<div class="error">${err}</div>`;
    }
}

loadData();
</script>

</body>
</html>
